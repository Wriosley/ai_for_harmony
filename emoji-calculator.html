<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .calculator {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
        }
        .title {
            text-align: center;
            color: #fff;
            margin-bottom: 20px;
            font-size: 1.5rem;
            background: linear-gradient(90deg, #00d9ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .mode-toggle { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .mode-btn {
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: transparent;
            color: #aaa;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .mode-btn.active { background: linear-gradient(135deg, #00d9ff, #a855f7); color: white; border: none; }
        .display {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 100px;
        }
        .expression { color: #888; font-size: 1rem; min-height: 30px; margin-bottom: 10px; word-wrap: break-word; }
        .result { color: #fff; font-size: 2.5rem; font-weight: bold; text-align: right; word-wrap: break-word; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .btn {
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        .btn:hover { transform: translateY(-2px); background: rgba(255, 255, 255, 0.2); }
        .btn:active { transform: translateY(0); }
        .btn-number { background: rgba(255, 255, 255, 0.08); }
        .btn-number:hover { background: rgba(255, 255, 255, 0.15); }
        .btn-operator { background: rgba(168, 85, 247, 0.3); color: #c084fc; }
        .btn-operator:hover { background: rgba(168, 85, 247, 0.5); }
        .btn-equals { background: linear-gradient(135deg, #00d9ff, #06b6d4); color: #000; font-weight: bold; }
        .btn-equals:hover { background: linear-gradient(135deg, #22d3ee, #0891b2); }
        .btn-clear { background: rgba(239, 68, 68, 0.3); color: #fca5a5; }
        .btn-clear:hover { background: rgba(239, 68, 68, 0.5); }
        .emoji-gif { height: 40px; vertical-align: middle; }
        .emoji-char { font-size: 1.5rem; vertical-align: middle; }
        .history { margin-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 15px; }
        .history-title { color: #888; font-size: 0.9rem; margin-bottom: 10px; }
        .history-item { color: #aaa; padding: 8px; cursor: pointer; border-radius: 8px; transition: background 0.2s; }
        .history-item:hover { background: rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div class="calculator">
        <h1 class="title">Emoji Calculator</h1>
        <div class="mode-toggle">
            <button class="mode-btn active" id="emojiModeBtn" onclick="setMode(true)">Emoji Mode</button>
            <button class="mode-btn" id="classicModeBtn" onclick="setMode(false)">Classic Mode</button>
        </div>
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>
        <div class="buttons">
            <button class="btn btn-clear" onclick="clearAll()">C</button>
            <button class="btn btn-clear" onclick="backspace()">DEL</button>
            <button class="btn btn-operator" onclick="addOperator('%')">%</button>
            <button class="btn btn-operator" onclick="addOperator('/')">/</button>
            <button class="btn btn-number" onclick="addNumber('7')">7</button>
            <button class="btn btn-number" onclick="addNumber('8')">8</button>
            <button class="btn btn-number" onclick="addNumber('9')">9</button>
            <button class="btn btn-operator" onclick="addOperator('*')">*</button>
            <button class="btn btn-number" onclick="addNumber('4')">4</button>
            <button class="btn btn-number" onclick="addNumber('5')">5</button>
            <button class="btn btn-number" onclick="addNumber('6')">6</button>
            <button class="btn btn-operator" onclick="addOperator('-')">-</button>
            <button class="btn btn-number" onclick="addNumber('1')">1</button>
            <button class="btn btn-number" onclick="addNumber('2')">2</button>
            <button class="btn btn-number" onclick="addNumber('3')">3</button>
            <button class="btn btn-operator" onclick="addOperator('+')">+</button>
            <button class="btn btn-number" onclick="addNumber('0')">0</button>
            <button class="btn btn-number" onclick="addNumber('.')">.</button>
            <button class="btn btn-equals" onclick="calculate()" style="grid-column: span 2">=</button>
        </div>
        <div class="history">
            <div class="history-title">History</div>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        var currentExpression = "";
        var currentResult = "0";
        var isEmojiMode = true;
        var history = [];

        var gifAnimations = {
            "0": "assets/animations/num_0.gif",
            "1": "assets/animations/num_1.gif",
            "2": "assets/animations/num_2.gif",
            "3": "assets/animations/num_3.gif",
            "4": "assets/animations/num_4.gif",
            "5": "assets/animations/num_5.gif",
            "6": "assets/animations/num_6.gif",
            "7": "assets/animations/num_7.gif",
            "8": "assets/animations/num_8.gif",
            "9": "assets/animations/num_9.gif",
            "+": "assets/animations/op_plus.gif",
            "-": "assets/animations/op_minus.gif",
            "*": "assets/animations/op_multiply.gif",
            "/": "assets/animations/op_divide.gif",
            "%": "assets/animations/op_divide.gif",
            "=": "assets/animations/op_equals.gif"
        };

        function preloadGifs() {
            var keys = Object.keys(gifAnimations);
            for (var i = 0; i < keys.length; i++) {
                var img = new Image();
                img.src = gifAnimations[keys[i]];
            }
        }

        function addNumber(num) {
            if (currentExpression.indexOf("=") !== -1) {
                currentExpression = "";
                currentResult = "";
            }
            if (currentResult === "0" && num !== ".") {
                currentResult = "";
            }
            if (num === "." && currentResult.indexOf(".") !== -1) return;
            currentResult = currentResult + num;
            updateDisplay();
        }

        function addOperator(op) {
            if (currentResult === "0" && op !== "-") return;
            currentExpression = currentExpression + currentResult + " " + op + " ";
            currentResult = "0";
            updateDisplay();
        }

        function calculate() {
            try {
                var expr = currentExpression + currentResult;
                var result = eval(expr);
                addToHistory(expr, result.toString());
                currentExpression = expr + " = ";
                currentResult = result.toString();
                updateDisplay();
            } catch (e) {
                currentResult = "Error";
                updateDisplay();
            }
        }

        function clearAll() {
            currentExpression = "";
            currentResult = "0";
            updateDisplay();
        }

        function backspace() {
            if (currentResult.length > 1) {
                currentResult = currentResult.slice(0, -1);
            } else {
                currentResult = "0";
            }
            updateDisplay();
        }

        function updateDisplay() {
            var expressionEl = document.getElementById("expression");
            var resultEl = document.getElementById("result");
            
            if (isEmojiMode) {
                expressionEl.innerHTML = "";
                var exprParts = currentExpression.split(" ");
                for (var i = 0; i < exprParts.length; i++) {
                    var char = exprParts[i];
                    if (char && gifAnimations[char]) {
                        var img = document.createElement("img");
                        img.src = gifAnimations[char];
                        img.className = "emoji-gif";
                        expressionEl.appendChild(img);
                    } else if (char) {
                        var span = document.createElement("span");
                        span.className = "emoji-char";
                        span.textContent = char;
                        expressionEl.appendChild(span);
                    }
                }
                
                if (currentResult !== "0" && currentResult !== "Error" && currentResult !== "Infinity") {
                    resultEl.innerHTML = "";
                    var resultChars = currentResult.split("");
                    for (var j = 0; j < resultChars.length; j++) {
                        var rchar = resultChars[j];
                        if (gifAnimations[rchar]) {
                            var img2 = document.createElement("img");
                            img2.src = gifAnimations[rchar];
                            img2.className = "emoji-gif";
                            resultEl.appendChild(img2);
                        } else {
                            var span2 = document.createElement("span");
                            span2.className = "emoji-char";
                            span2.textContent = rchar;
                            resultEl.appendChild(span2);
                        }
                    }
                } else {
                    resultEl.textContent = currentResult;
                }
            } else {
                expressionEl.textContent = currentExpression;
                resultEl.textContent = currentResult;
            }
        }

        function addToHistory(expr, result) {
            history.unshift({ expr: expr, result: result });
            if (history.length > 5) history.pop();
            var historyList = document.getElementById("historyList");
            var html = "";
            for (var i = 0; i < history.length; i++) {
                html += "<div class="history-item" onclick="loadFromHistory('" + history[i].result + "')">" + history[i].expr + " = " + history[i].result + "</div>";
            }
            historyList.innerHTML = html;
        }

        function loadFromHistory(result) {
            currentExpression = "";
            currentResult = result;
            updateDisplay();
        }

        function setMode(emoji) {
            isEmojiMode = emoji;
            document.getElementById("emojiModeBtn").className = "mode-btn" + (emoji ? " active" : "");
            document.getElementById("classicModeBtn").className = "mode-btn" + (!emoji ? " active" : "");
            updateDisplay();
        }

        preloadGifs();
    </script>
</body>
</html>
